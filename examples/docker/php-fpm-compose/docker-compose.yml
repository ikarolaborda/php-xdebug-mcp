services:
  php-fpm:
    build: .
    volumes:
      - ./public:/var/www/html
      - ./docker/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
      - ./docker/zz-clear-env-off.conf:/usr/local/etc/php-fpm.d/zz-clear-env-off.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - app

networks:
  app:
    name: php_xdebug_mcp_example
